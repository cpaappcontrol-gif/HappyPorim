padding:80px 20px;

align-items:center;
text-align:center;
}

background:linear-gradient(135deg,#1a1a1a,#330033);

.section:nth-child(even){
background:linear-gradient(135deg,#000428,#004e92);
}

font-size:48px;

}

from{text-shadow:0 0 10px #ff00ff;}

function enterWorld(){
let code=document.getElementById("code").value.trim();
if(data[code]){
document.getElementById("login").style.display="none";
document.getElementById("world").style.display="block";
document.getElementById("title").innerHTML=data[code].title;
document.getElementById("intro").innerHTML=data[code].intro;
document.getElementById("declaration").innerHTML=data[code].declaration;
document.getElementById("mission").innerHTML=data[code].mission;

confetti({particleCount:150,spread:100,origin:{y:0.6}});

}else{
document.getElementById("error").innerHTML="🚨 קוד שגוי… אולי מישהו אכל יותר מדי אוזני המן?";
}
}

/* 😂 מד צחוק */
let laugh=0;
function increaseLaugh(){
laugh+=Math.floor(Math.random()*20)+5;
if(laugh>=100){
laugh=100;
confetti({particleCount:200,spread:120});
alert("🤣 100% צחוק! הבית הוכרז כאזור עדלאידע!");
}
document.getElementById("laughMeter").innerText=laugh+"%";
}

/* 👑 Easter Egg */
let clicks=0;
function secretClick(){
clicks++;
if(clicks>=5){
confetti({particleCount:300,spread:150});
alert("🎉 מצב סודי הופעל! אתם רשמית אלופי הפורטל 🎉");
clicks=0;
}
}

/* ⭐ כוכבים */
const canvas=document.getElementById("stars");
const ctx=canvas.getContext("2d");

function resizeCanvas(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize",resizeCanvas);

let stars=[];
for(let i=0;i<120;i++){
stars.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*2});
}

function drawStars(){
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="white";
stars.forEach(s=>{
ctx.beginPath();
ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
ctx.fill();
});
requestAnimationFrame(drawStars);
}
drawStars();
