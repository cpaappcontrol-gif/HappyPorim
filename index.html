<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>יקום פורים – עידו ואביה פרחי</title>

<style>
body{
margin:0;
font-family:Arial;
color:white;
overflow-x:hidden;
background:black;
}

/* ⭐ רקע כוכבים */
canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

#login{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:linear-gradient(135deg,#ff0080,#7928ca,#2afadf);
text-align:center;
}

input{
padding:12px;
border-radius:10px;
border:none;
font-size:16px;
text-align:center;
}

button{
margin-top:10px;
padding:12px 25px;
border-radius:10px;
border:none;
cursor:pointer;
font-weight:bold;
}

#error{margin-top:10px;}

#world{
display:none;
animation: fadeIn 2s ease;
}

@keyframes fadeIn{
from{opacity:0;}
to{opacity:1;}
}

.section{
min-height:100vh;
padding:80px 20px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.section:nth-child(odd){
background:linear-gradient(135deg,#1a1a1a,#330033);
}

.section:nth-child(even){
background:linear-gradient(135deg,#000428,#004e92);
}

h1{
font-size:48px;
animation: glow 2s infinite alternate;
cursor:pointer;
}

@keyframes glow{
from{text-shadow:0 0 10px #ff00ff;}
to{text-shadow:0 0 30px #00ffff;}
}

.big{
font-size:24px;
max-width:700px;
}

.video{
margin:30px 0;
width:80%;
max-width:560px;
aspect-ratio:16/9;
}

.footer{
background:black;
padding:40px;
text-align:center;
font-size:18px;
}

#laughMeter{
font-size:50px;
margin:20px;
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<div id="login">
<h2>🎭 פורטל פורים הרשמי 🎭</h2>
<p>נוצר באהבה על ידי עידו ואביה פרחי</p>
<input type="text" id="code" placeholder="הכנס קוד סודי">
<button onclick="enterWorld()">פתח את היקום</button>
<p id="error"></p>
</div>

<div id="world">

<div class="section">
<h1 id="title" onclick="secretClick()"></h1>
<p class="big" id="intro"></p>

<iframe class="video"
src="https://www.youtube.com/embed/r6QT2S0aljo"
frameborder="0"
allowfullscreen></iframe>
</div>

<div class="section">
<h1>📜 הכרזה רשמית</h1>
<p class="big" id="declaration"></p>
</div>

<div class="section">
<h1>🎯 משימת פורים</h1>
<p class="big" id="mission"></p>
</div>

<div class="section">
<h1>🎬 סרטון לחימום מצב רוח</h1>


<iframe class="video"
src="https://www.youtube.com/embed/vmn2i3avGOc"
frameborder="0"
allowfullscreen></iframe>

</div>

<div class="section">
<h1>😂 מד צחוק</h1>
<h2 id="laughMeter">0%</h2>
<button onclick="increaseLaugh()">הצחקתי!</button>
</div>

<div class="footer">
🎉 פורים שמח ממשפחת פרחי – עידו ואביה 🎉
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>

const data={

"MISHMAR-RAZ-5786":{
title:"🎭 משפחת משמור – יקום פורים נפתח!",
intro:"רזיאל ועליזה… הצלחתם להפעיל את שער השמחה.",
declaration:"לאחר בדיקה יסודית נמצא כי אתם בעלי פוטנציאל מסיבה גבוה מהממוצע הארצי.",
mission:"לרקוד 60 שניות בלי מוזיקה ולגרום לשכן לחשוב שיש תקלה בחשמל."
},

"SAID-POWER-5786":{
title:"🔥 משפחת סעיד – אנרגיה זוהתה!",
intro:"הודיעה ואוריאל… השרתים רועדים.",
declaration:"המערכת זיהתה וייבים של חגיגה עוד לפני הקוד.",
mission:"להחליף ביניכם קולות ל-3 דקות ולדבר רציני לגמרי."
},

"MOSHE-JOY-5786":{
title:"✨ משפחת משה – כניסה מאושרת!",
intro:"טוהר ויונתן… מצב רוח זוהה כחיובי במיוחד.",
declaration:"נמצאתם ראויים לדרגת עדלאידע בכירה.",
mission:"לספר בדיחה גרועה במיוחד ולהישאר רציניים."
},

"SHMUEL-SMILE-5786":{
title:"🎶 משפחת שמואל – שמחה זוהתה!",
intro:"נועם ושירה… המערכת התחילה לשיר לבד.",
declaration:"אחוזי חיוך: 98%. חשד לקפיצות ספונטניות.",
mission:"לשיר שיר פורים דרמטי כאילו אתם באירוויזיון."
},

"PARHI-ROYAL-5786": {
  title: "👑 משפחת פרחי – כוח הצחוק נפתח!",
  intro: "אבא, אמא, שלומי, יוסי, נתי, רונית, מיכל, מירב ועידו – כולם מוכנים לצחוק, אבל כל אחד לעצמו 😉. המערכת מזהה **רמות צחוק גבוהות**, ואתה מוזמן להצטרף למסע המשפחתי המשעשע.",
  declaration: "משפחת פרחי היא מקור בלתי נדלה של צחוק, הפתעות ואוזני המן! כאן כל אחד יכול לצחוק לעצמו, להמציא בדיחה משלו, ולגלות שכל רגע הוא הזדמנות קטנה לשמחה 🎉",
  mission: "משימת פורטל אישית:\n\n1️⃣ קרא בדיחה קצרה על אחד מבני המשפחה וצחק על עצמך\n2️⃣ המצא תנועת ריקוד קצרה לבד, אפילו 10 שניות\n3️⃣ תבדוק מי מבני המשפחה הצפוי לך הכי מצחיק רק מהמחשבה\n4️⃣ תן לעצמך חיוך גדול ותראה כמה כיף לצחוק לבד 🤣"
}

"AVRAHAM-BALAGAN-5786": {
  title: "🎊 משפחת אברהם – בלגן חיובי!",
  intro: "ברוכים הבאים לפורטל המשפחתי של אברהם!\nכאן כל אחד יכול לקרוא לעצמו ולצחוק בלי לחץ 😄",
  declaration: "אבא שי – מנסה לשוחט בשר בארגנטינה ומנהל חיי הרפתקאות בינלאומיים.\n\n" +
               "אמא – הגננת שמוצאת סדר גם כשהכיתה ריקה לגמרי.\n\n" +
               "אביה – רואה חשבונות וחיוך מסתתר בכל דוח שהוא סורק.\n\n" +
               "שגיא – נהג מונית שמגלה קומדיה בכל פקק בעיר.\n\n" +
               "שירה – התחתנה השנה, ועדיין מתרגלת איך להיות כוכבת בכל סצנה.\n\n" +
               "יגל – חייל אמיץ, תמיד מוצא דרך להפוך רגעים רציניים למשהו מצחיק.\n\n" +
               "אורטל – גרה בהישוב שמסוכן רק מהשכנים המצחיקים, ומצליחה לשרוד את כל הבדיחות.\n\n" +
               "כאן כל אחד לעצמו, אבל הצחוק? תמיד מדבק 🎉",
  mission: "משימת פורטל אישית:\n\n" +
           "1️⃣ המצא בדיחה קצרה על מצב יומיומי במשפחה\n" +
           "2️⃣ חקה סצנה קומית שקרתה לאחרונה בבית\n" +
           "3️⃣ עשה חיוך או פרצוף מצחיק לעצמך\n" +
           "4️⃣ גלה משהו קטן סביבך וצחק עליו לבד 🤣"
}

};

function enterWorld(){
let code=document.getElementById("code").value.trim();
if(data[code]){
document.getElementById("login").style.display="none";
document.getElementById("world").style.display="block";
document.getElementById("title").innerHTML=data[code].title;
document.getElementById("intro").innerHTML=data[code].intro;
document.getElementById("declaration").innerHTML=data[code].declaration;
document.getElementById("mission").innerHTML=data[code].mission;

confetti({particleCount:150,spread:100,origin:{y:0.6}});

}else{
document.getElementById("error").innerHTML="🚨 קוד שגוי… אולי מישהו אכל יותר מדי אוזני המן?";
}
}

/* 😂 מד צחוק */
let laugh=0;
function increaseLaugh(){
laugh+=Math.floor(Math.random()*20)+5;
if(laugh>=100){
laugh=100;
confetti({particleCount:200,spread:120});
alert("🤣 100% צחוק! הבית הוכרז כאזור עדלאידע!");
}
document.getElementById("laughMeter").innerText=laugh+"%";
}

/* 👑 Easter Egg */
let clicks=0;
function secretClick(){
clicks++;
if(clicks>=5){
confetti({particleCount:300,spread:150});
alert("🎉 מצב סודי הופעל! אתם רשמית אלופי הפורטל 🎉");
clicks=0;
}
}

/* ⭐ כוכבים */
const canvas=document.getElementById("stars");
const ctx=canvas.getContext("2d");

function resizeCanvas(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize",resizeCanvas);

let stars=[];
for(let i=0;i<120;i++){
stars.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*2});
}

function drawStars(){
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="white";
stars.forEach(s=>{
ctx.beginPath();
ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
ctx.fill();
});
requestAnimationFrame(drawStars);
}
drawStars();

</script>

</body>
</html>
